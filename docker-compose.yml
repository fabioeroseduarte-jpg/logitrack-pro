
version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: logitrack-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: logitrack
      MYSQL_USER: logitrack
      MYSQL_PASSWORD: logitrack
    ports:
      - "3306:3306"
    volumes:
      - ./database/carga_inicial.sql:/docker-entrypoint-initdb.d/carga_inicial.sql

  backend:
    build: ./backend
    container_name: logitrack-backend
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/logitrack?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: logitrack
      SPRING_DATASOURCE_PASSWORD: logitrack
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    container_name: logitrack-frontend
    restart: always
    ports:
      - "4200:80"
    depends_on:
      - backend
